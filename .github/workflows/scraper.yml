name: DamKoi Scraper

on:
  schedule:
    # Every 6 hours — 8am, 2pm, 8pm, 2am BDT (2am/8am/2pm/8pm UTC)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, harvest, scrape, platforms, alerts]
      shards:
        description: 'Number of parallel scrape shards (1-10)'
        required: false
        default: '3'

# Shared environment for all jobs
env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  DARAZ_APP_KEY: ${{ secrets.DARAZ_APP_KEY }}
  DARAZ_APP_SECRET: ${{ secrets.DARAZ_APP_SECRET }}
  DARAZ_TRACKING_ID: ${{ secrets.DARAZ_TRACKING_ID }}
  ENABLED_PLATFORMS: daraz,rokomari,pickaboo,cartup,chaldal,othoba
  REDIS_URL: ''

jobs:
  # ── 1. Harvest: discover new product URLs for all platforms ───────
  harvest:
    name: Harvest New Products
    if: ${{ github.event.inputs.job == 'harvest' || github.event.inputs.job == 'all' || github.event.inputs.job == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Harvest product URLs (Daraz sitemaps + category pages + all platforms)
        run: python run_cron.py harvest

  # ── 2. Scrape Daraz: single shard, mtop HTTP path (no browser) ────
  # Free-tier friendly: the mtop detail API yields ~97% with plain HTTP, so we
  # skip the heavy Playwright install and run one shard (limit 3,000 covers the
  # whole catalog). ~2 min/run keeps us well under GitHub's free 2,000 min/mo.
  scrape:
    name: Scrape Prices
    if: ${{ github.event.inputs.job == 'scrape' || github.event.inputs.job == 'all' || github.event.inputs.job == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Scrape all Daraz products (single shard)
        run: python run_cron.py scrape 0 1

  # ── 3. Scrape other platforms: Rokomari, Pickaboo, Cartup, etc. ───
  platforms:
    name: Scrape Non-Daraz Platforms
    if: ${{ github.event.inputs.job == 'platforms' || github.event.inputs.job == 'all' || github.event.inputs.job == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Install Playwright (for Cartup, Pickaboo, Othoba)
        run: |
          pip install playwright playwright-stealth
          playwright install chromium --with-deps
      - name: Scrape Rokomari, Pickaboo, Cartup, Chaldal, Othoba
        run: python run_cron.py platforms

  # ── 4. Alerts: check prices and notify users ──────────────────────
  alerts:
    name: Check Alerts
    # !failure() = run when scrape succeeded OR was skipped (e.g. job=='alerts' dispatch)
    if: >-
      ${{ !failure() && (github.event.inputs.job == 'alerts' || github.event.inputs.job == 'all' || github.event.inputs.job == '' || github.event_name == 'schedule') }}
    needs: [scrape]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Check price alerts
        run: python run_cron.py alerts
