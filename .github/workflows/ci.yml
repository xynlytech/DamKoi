name: DamKoi CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: damkoi
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: damkoi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://damkoi:testpass@localhost:5432/damkoi_test
      APP_ENV: test
      APP_DEBUG: "true"
      ENABLED_PLATFORMS: daraz
      # Leave external services empty — tests mock them
      REDIS_URL: ""
      SENTRY_DSN: ""
      TELEGRAM_BOT_TOKEN: ""
      RESEND_API_KEY: ""
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
      SUPABASE_JWT_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -x --tb=short -q

  # ── Web Build Check ────────────────────────────────────────────
  web:
    name: Web (next build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://api.damkoi.com/v1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_build
        run: npm run build

  # ── Lint ───────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: ESLint
        working-directory: web
        run: npm run lint
