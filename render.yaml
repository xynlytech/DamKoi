# Render deployment configuration
# DamKoi Backend — FastAPI API Server

services:
  - type: web
    name: damkoi-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_BASE_URL
        value: https://damkoi-api.onrender.com
      - key: FRONTEND_URL
        value: https://damkoi.com
      - key: CORS_ORIGINS
        value: '["https://damkoi.com","https://www.damkoi.com"]'
    healthCheckPath: /health
